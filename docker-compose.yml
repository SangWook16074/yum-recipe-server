services:
  mongodb:
    image: mongo
    container_name: yum-mongodb-container
    volumes:
      - mongo_data:/var/lib/mongo
    ports:
      - "27017:27017"
    networks:
      - yum-server-net


  yum-recipe-app:
    image: ${IMAGE_NAME}
    container_name: yum-recipe-server-container
    depends_on:
      - mongodb
    networks:
      - yum-server-net


volumes:
  mongo_data:

networks:
  yum-server-net:
    name: yum-server-net
    external: true